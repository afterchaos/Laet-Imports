<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LAET IMPORTS - Detalhes do produto">
    <title>LAET IMPORTS - Detalhes do produto</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Wave Shock Background -->
    <div class="wave-container">
        <svg class="waves-svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
            <defs>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>
            <circle class="wave-circle wave-circle-1" cx="600" cy="400" r="10"/>
            <circle class="wave-circle wave-circle-2" cx="600" cy="400" r="10"/>
            <circle class="wave-circle wave-circle-3" cx="600" cy="400" r="10"/>
            <circle class="wave-circle wave-circle-4" cx="600" cy="400" r="10"/>
            <circle class="wave-circle wave-circle-5" cx="600" cy="400" r="10"/>
        </svg>
        <div class="wave-glow wave-glow-1"></div>
        <div class="wave-glow wave-glow-2"></div>
        <div class="wave-glow wave-glow-3"></div>
    </div>

    <header class="header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <span class="logo-laet">LAET</span>
                <span class="logo-imports">IMPORTS</span>
            </a>
            <div class="header-actions">
                <a href="index.html" class="btn btn-secondary">Voltar à loja</a>
            </div>
        </div>
    </header>

    <main class="product-detail-page">
        <div class="container">
            <div id="product-detail-container" class="product-detail-grid">
                <div class="product-detail-card product-detail-image" id="detail-image">
                    <!-- imagem do produto -->
                </div>
                <div class="product-detail-card product-detail-info">
                    <span class="product-category" id="detail-category"></span>
                    <h1 id="detail-name"></h1>
                    <div class="product-detail-price">
                        <span class="product-price" id="detail-price"></span>
                        <span class="product-price-old" id="detail-old-price"></span>
                    </div>
                    <p class="product-installment" id="detail-installment"></p>
                    <p class="product-detail-description" id="detail-description"></p>
                    <ul class="product-detail-specs" id="detail-specs"></ul>
                    <div class="product-detail-actions">
                        <a href="#" class="btn btn-primary btn-contact" id="detail-whatsapp-btn" target="_blank" rel="noopener">
                            <svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px;flex-shrink:0;">
                                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                            </svg>
                            <span class="btn-contact-inner">
                                <span class="btn-contact-title">Comprar via WhatsApp</span>
                                <span class="btn-contact-label"></span>
                            </span>
                        </a>
                        <a href="#" class="btn btn-secondary btn-contact" id="detail-instagram-btn" target="_blank" rel="noopener">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;flex-shrink:0;">
                                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                            </svg>
                            <span class="btn-contact-inner">
                                <span class="btn-contact-title">Ver no Instagram</span>
                                <span class="btn-contact-label"></span>
                            </span>
                        </a>
                    </div>
                </div>
            </div>
            <div class="back-link">
                <a href="index.html">← Voltar à loja</a>
            </div>
        </div>
    </main>

    <script src="api-client.js"></script>
    <script src="product.js"></script>
    <script src="waves.js"></script>
</body>
</html>
